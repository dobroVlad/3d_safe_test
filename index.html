<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Interactive Loot Box</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f9a8d4; /* Стартовий колір */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            touch-action: none;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 10;
            pointer-events: none; /* Кліки проходять наскрізь до canvas (сцени) */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }
        
        .hidden {
            display: none !important;
            opacity: 0;
        }
        
        /* Loading & Error Screens */
        #loading, #file-prompt {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto;
            background: rgba(10, 10, 15, 0.85);
            padding: 20px 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            z-index: 20;
            text-align: center;
            font-size: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: opacity 0.5s;
        }
        #loading span { color: #fde047; font-weight: bold; }

        /* UI Overlay - Монетки */
        #coins-container {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            transition: opacity 0.3s;
        }
        .coin {
            width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #fef08a, #ca8a04);
            border-radius: 50%;
            border: 4px solid #854d0e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: 900;
            color: #713f12;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.5);
            position: relative;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 1px 1px rgba(255,255,255,0.5);
        }
        .coin.filled::after {
            content: '';
            position: absolute;
            width: 16px; height: 16px;
            background: #111;
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }
        .coin.filled {
            color: transparent; /* Ховаємо знак ? */
            text-shadow: none;
            transform: scale(1.15);
        }

        /* Текст підказки */
        #tap-text {
            position: absolute;
            bottom: 150px;
            font-size: 26px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fde047;
            text-shadow: 0 4px 15px rgba(0,0,0,0.9), 0 0 10px rgba(253, 224, 71, 0.5);
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); opacity: 0.7; }
            to { transform: scale(1.05); opacity: 1; }
        }

        /* Картка Винагороди (Reward Card) */
        #reward-card {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            border: 4px solid #fef08a;
            border-radius: 24px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.9), inset 0 0 30px rgba(255,255,255,0.3);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: auto;
        }
        #reward-card.show {
            transform: translate(-50%, -50%) scale(1);
        }
        .reward-icon {
            font-size: 90px;
            margin-bottom: 20px;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6));
            animation: float-card 3s ease-in-out infinite;
        }
        .reward-text {
            font-size: 36px;
            font-weight: 900;
            color: #fef08a;
            text-shadow: 0 3px 6px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }
        @keyframes float-card {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Кнопка Retry */
        #retry-btn {
            position: absolute;
            bottom: 80px;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            color: #713f12;
            background: linear-gradient(to bottom, #fde047, #ca8a04);
            border: 3px solid #854d0e;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            transition: transform 0.2s, filter 0.2s;
            pointer-events: auto;
        }
        #retry-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
        #retry-btn:active { transform: scale(0.95); }
    </style>
    <!-- Підключення Three.js та пост-обробки -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loading">Завантаження ресурсів... <span id="progress">0%</span></div>
    
    <div id="file-prompt" class="hidden">
        <div style="margin-bottom: 15px; font-size: 16px;">Помилка локального файлу (CORS).<br>Виберіть <strong>обидва FBX файли</strong> з папки <code>source/</code>:<br><span style="opacity:0.7; font-size:13px;">Safe.fbx &amp; Hip Hop Dancing.fbx</span></div>
        <label for="file-input" style="cursor: pointer; background: #fef08a; color: #111; padding: 10px 20px; border-radius: 8px; font-weight: bold; display: inline-block;">
            Вибрати FBX файли
        </label>
        <input type="file" id="file-input" accept=".fbx" multiple style="display: none;" />
    </div>

    <!-- UI Шар -->
    <div id="ui-layer" class="hidden">
        <div id="tap-text" class="hidden">Tap to open</div>
        <div id="coins-container">
            <div class="coin" id="coin-1">?</div>
            <div class="coin" id="coin-2">?</div>
            <div class="coin" id="coin-3">?</div>
        </div>
        <div id="reward-card">
            <div class="reward-icon">💰</div>
            <div class="reward-text">Gold x1000</div>
        </div>
        <button id="retry-btn" class="hidden">Відкрити ще раз</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 1. Базові налаштування сцени ---
        const scene = new THREE.Scene();
        // Без туману - рожевий туман фарбував усі темні поверхні у багряний

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 50, 220); 
        camera.lookAt(0, 20, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.LinearToneMapping; // Нейтральне тонмепінг без давлення на кольор
        renderer.toneMappingExposure = 1.0;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- 2. Пост-обробка (Bloom) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth/2, window.innerHeight/2), 1.5, 0.4, 0.85);
        bloomPass.threshold = 1.0; // Високий поріг, щоб фон не світився
        bloomPass.strength = 0.3; // М'яке базове світіння
        bloomPass.radius = 0.5;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 2.5. Анімований фон (Небо) всередині WebGL ---
        const skyGeo = new THREE.SphereGeometry(1000, 32, 15);
        const skyMat = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0.0 },
                colorTop: { value: new THREE.Color(0xfdba74) }, // Orange
                colorMid: { value: new THREE.Color(0xf9a8d4) }, // Pink
                colorBot: { value: new THREE.Color(0x7dd3fc) }  // Sky blue
            },
            vertexShader: `
                varying vec3 vWorldPosition;
                void main() {
                    vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                    vWorldPosition = worldPosition.xyz;
                    gl_Position = projectionMatrix * viewMatrix * worldPosition;
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 colorTop;
                uniform vec3 colorMid;
                uniform vec3 colorBot;
                varying vec3 vWorldPosition;

                void main() {
                    float h = normalize(vWorldPosition).y; 
                    float anim = sin(time * 0.4) * 0.15; // Анімація переливання
                    
                    vec3 color = mix(colorBot, colorMid, smoothstep(-0.3 + anim, 0.2 + anim, h));
                    color = mix(color, colorTop, smoothstep(0.2 + anim, 0.8 + anim, h));
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `,
            side: THREE.BackSide,
            depthWrite: false
        });
        const skyBox = new THREE.Mesh(skyGeo, skyMat);
        scene.add(skyBox);

        // --- 3. Освітлення ---
        // Сильне фонове освітлення - головна причина темних моделей
        const ambientLight = new THREE.AmbientLight(0xffffff, 3.0);
        scene.add(ambientLight);

        // Головне напрямлене світло (зверху спереду)
        const dirLight = new THREE.DirectionalLight(0xffffff, 3);
        dirLight.position.set(100, 200, 100);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // Бокове заповнююче світло (зліва)
        const fillLight = new THREE.DirectionalLight(0xffffff, 2);
        fillLight.position.set(-150, 50, 100);
        scene.add(fillLight);

        // Бек світло (ззаду) щоб винікли чорні плями на задніх частинах
        const backLight = new THREE.DirectionalLight(0xffffff, 2);
        backLight.position.set(0, 100, -200);
        scene.add(backLight);

        // --- 4. Оточення (Сітка підлоги) ---
        const planeGeo = new THREE.PlaneGeometry(1000, 1000);
        const planeMat = new THREE.ShadowMaterial({ opacity: 0.25 }); // М'якіша тінь
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -20;
        plane.receiveShadow = true;
        scene.add(plane);

        const grid = new THREE.GridHelper(1000, 40, 0xffffff, 0xffffff);
        grid.position.y = -19.9;
        grid.material.opacity = 0.15; // Світла напівпрозора сітка
        grid.material.transparent = true;
        scene.add(grid);

        // --- 5. VFX: Частинки (Сяючі іскри) ---
        // Кругла текстура для частинок
        const canvas = document.createElement('canvas');
        canvas.width = 16; canvas.height = 16;
        const ctx = canvas.getContext('2d');
        ctx.beginPath(); ctx.arc(8, 8, 8, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
        const particleTex = new THREE.CanvasTexture(canvas);

        const particlesCount = 50; // Зменшено кількість (було 200)
        const particlesGeo = new THREE.BufferGeometry();
        const posArray = new Float32Array(particlesCount * 3);
        const speedArray = new Float32Array(particlesCount);
        
        for(let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i] = (Math.random() - 0.5) * 300;     // X
            posArray[i+1] = Math.random() * 250 - 50;      // Y
            posArray[i+2] = (Math.random() - 0.5) * 300;   // Z
            speedArray[i/3] = Math.random() * 0.1 + 0.05;  // Уповільнено (було 0.3 + 0.1)
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        // Трохи підвищуємо значення кольору частинок для дуже м'якого світіння
        const particleColor = new THREE.Color(0xffe4b5);
        particleColor.multiplyScalar(1.2); 

        const particlesMat = new THREE.PointsMaterial({
            size: 6, color: particleColor, transparent: true, opacity: 0.8,
            blending: THREE.AdditiveBlending, depthWrite: false, map: particleTex
        });
        const particlesMesh = new THREE.Points(particlesGeo, particlesMat);
        scene.add(particlesMesh);

        // --- 6. 3D Ассети: Зірка ---
        const starShape = new THREE.Shape();
        const outR = 8, inR = 3.5;
        for (let i = 0; i < 10; i++) {
            const r = i % 2 === 0 ? outR : inR;
            const a = (i * Math.PI) / 5;
            if (i === 0) starShape.moveTo(Math.sin(a)*r, Math.cos(a)*r);
            else starShape.lineTo(Math.sin(a)*r, Math.cos(a)*r);
        }
        const starGeo = new THREE.ExtrudeGeometry(starShape, { depth: 1, bevelEnabled: true, bevelThickness: 0.5, bevelSize: 0.5, bevelSegments: 2 });
        starGeo.center();
        const starMat = new THREE.MeshStandardMaterial({ 
            color: 0xfde047, emissive: 0xca8a04, emissiveIntensity: 4.0, roughness: 0.2, metalness: 0.6 
        });
        const starMesh = new THREE.Mesh(starGeo, starMat);
        starMesh.position.set(0, 65, 0);
        starMesh.visible = false; // Прихована до завантаження сейфу
        scene.add(starMesh);

        // --- 7. Завантаження Скрині (Safe) ---
        const safeGroup = new THREE.Group();
        scene.add(safeGroup);
        const basePosition = new THREE.Vector3(0, -10, 0);
        let safeMaterials = []; // Масив для керування світінням матеріалів
        
        const fbxLoader = new FBXLoader();

        function setupLoadedModel(object) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('file-prompt').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');

            object.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    if (child.material) {
                        const enhance = (mat) => {
                            mat.roughness = 0.5;
                            mat.metalness = 0.4;
                            
                            // Залишаємо оригінальні кольори моделі (без жорсткого перевизначення color)
                            
                            // Налаштування для світіння під час кліку
                            mat.emissive.setHex(0x38bdf8); // Колір спалаху (яскраво блакитний)
                            mat.emissiveIntensity = 0.0;
                            safeMaterials.push(mat);
                            mat.needsUpdate = true;
                        };
                        if (Array.isArray(child.material)) child.material.forEach(enhance);
                        else enhance(child.material);
                    }
                }
            });

            // 1. Скидаємо будь-які трансформації
            object.position.set(0,0,0);
            object.scale.set(1,1,1);
            object.updateMatrixWorld(true);

            // 2. Рахуємо розмір і масштаб
            const box = new THREE.Box3().setFromObject(object);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            
            // Зменшили цільовий розмір зі 120 до 75
            const scale = 75 / maxDim; 
            
            // 3. Застосовуємо масштаб
            object.scale.setScalar(scale);
            object.updateMatrixWorld(true);

            // 4. Тепер рахуємо центр вже масштабованого об'єкта
            const scaledBox = new THREE.Box3().setFromObject(object);
            const center = scaledBox.getCenter(new THREE.Vector3());
            
            // 5. Віднімаємо центр, щоб візуально модель стала точно в 0,0,0
            object.position.sub(center);
            object.updateMatrixWorld(true);

            safeGroup.add(object);
            
            // Ледь помітно повернемо сейф, щоб було краще видно його форму і вміст
            safeGroup.rotation.y = -Math.PI / 16;
            
            // 6. Рахуємо фінальну висоту для підлоги (-20)
            const finalBox = new THREE.Box3().setFromObject(safeGroup);
            const halfHeight = (finalBox.max.y - finalBox.min.y) / 2;
            
            basePosition.y = -20 + halfHeight; 
            safeGroup.position.copy(basePosition);

            // Фокус камери на об'єкті
            camera.lookAt(0, basePosition.y, 0);
            
            // Надійно вираховуємо висоту зірки на основі фіксованої геометрії
            const height = finalBox.max.y - finalBox.min.y;
            starIdleY = (-20) + height + 25;
            
            // Оновлюємо позицію зірки
            starMesh.position.y = starIdleY; 
            starMesh.position.z = 0; 
            starMesh.position.x = 0;
            starMesh.visible = true; // Показуємо зірку
        }

        // Обробка ручного вибору файлів (підтримує multiple)
        document.getElementById('file-input').addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            document.getElementById('file-prompt').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('loading').innerHTML = 'Обробка... <span id="progress">0%</span>';

            files.forEach(file => {
                const url = URL.createObjectURL(file);
                const name = file.name.toLowerCase();

                if (name.includes('safe')) {
                    fbxLoader.load(url, (obj) => { URL.revokeObjectURL(url); setupLoadedModel(obj); }, updateProgress, showError);
                } else if (name.includes('hip') || name.includes('dancing') || name.includes('knight')) {
                    // Завантажуємо лівого, потім правого з того самого URL
                    fbxLoader.load(url, (obj) => { setupKnight(obj, -130); }, undefined, (err) => console.warn(err));
                    fbxLoader.load(url, (obj) => { URL.revokeObjectURL(url); setupKnight(obj, 130); }, undefined, (err) => console.warn(err));
                }
            });
        });

        function updateProgress(xhr) {
            const el = document.getElementById('progress');
            if (el && isFinite(xhr.total) && xhr.total > 0) el.innerText = Math.round((xhr.loaded/xhr.total)*100) + '%';
        }
        function showError(err) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('file-prompt').classList.remove('hidden');
            console.warn('CORS або файл не знайдено:', err);
        }

        // Автозавантаження скрині
        fbxLoader.load('source/Safe.fbx', setupLoadedModel, updateProgress, showError);

        // --- 7.5. Завантаження Танцюючих Лицарів ---
        const knightMixers = [];

        function setupKnight(object, xPosition) {
            // Масштабуємо лицаря під розмір сцени
            object.scale.setScalar(0.35);
            object.updateMatrixWorld(true);

            // Центруємо по X та ставимо на підлогу
            const box = new THREE.Box3().setFromObject(object);
            const center = box.getCenter(new THREE.Vector3());
            object.position.x = xPosition - center.x;
            object.position.y = -20 - box.min.y;
            object.position.z = -20; // Трохи за сейфом для глибини

            // Повертаємо лицаря обличчям до центру
            object.rotation.y = xPosition > 0 ? -Math.PI / 6 : Math.PI / 6;

            object.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(object);

            // Запускаємо анімацію якщо є
            if (object.animations && object.animations.length > 0) {
                const mixer = new THREE.AnimationMixer(object);
                const action = mixer.clipAction(object.animations[0]);
                action.play();
                knightMixers.push(mixer);
            }
        }

        // Завантажуємо двох лицарів з одного файлу
        function loadKnights() {
            fbxLoader.load('source/Hip Hop Dancing.fbx', (obj) => {
                setupKnight(obj, -130);
            }, undefined, (err) => console.warn('Knight L - CORS, завантажте вручну:', err));

            fbxLoader.load('source/Hip Hop Dancing.fbx', (obj) => {
                setupKnight(obj, 130);
            }, undefined, (err) => console.warn('Knight R - CORS, завантажте вручну:', err));
        }
        loadKnights();

        // --- 8. State Machine та Інтерактивність ---
        const STATE = { IDLE: 0, CLICK1: 1, CLICK2: 2, CLICK3: 3, REVEAL: 4, POST: 5 };
        let state = STATE.IDLE;

        let squashY = 1.0, squashXZ = 1.0;
        let targetEmissive = 0.0, currentEmissive = 0.0;
        let targetBloom = 0.3; // М'який базовий bloom
        let starIdleY = 65; // Стартова висота зірки

        // Обробник кліків по всьому екрану
        document.addEventListener('pointerdown', (e) => {
            if (e.target.closest('#reward-card') || e.target.closest('#file-prompt') || e.target.closest('#retry-btn')) return;
            
            if (state >= STATE.IDLE && state < STATE.CLICK3) {
                state++;
                triggerFlash();
                document.getElementById('coin-' + state).classList.add('filled');
                
                if (state === STATE.CLICK3) {
                    document.getElementById('tap-text').classList.remove('hidden');
                }
            } 
            else if (state === STATE.CLICK3) {
                state = STATE.REVEAL;
                triggerFinalReveal();
            }
        });

        function triggerFlash() {
            // Швидка деформація (Squash) та спалах
            squashY = 0.7;     // стискається
            squashXZ = 1.25;   // розширюється
            targetEmissive = 2.0;  // Локальний м'який спалах сейфу
            currentEmissive = 2.0; 
            targetBloom = 0.8;

            // Згасання спалаху через 150мс
            setTimeout(() => { 
                targetEmissive = 0.0; 
                targetBloom = 0.3; 
            }, 150);
        }

        function triggerFinalReveal() {
            // Більш стриманий фінальний спалах
            targetBloom = 2.0;
            currentEmissive = 4.0; 
            targetEmissive = 4.0;
            
            // Після 300мс (на піку світла) - підміняємо об'єкти
            setTimeout(() => {
                safeGroup.visible = false;
                
                // Одразу скидаємо параметри світіння сейфу, поки він прихований
                targetEmissive = 0.0;
                currentEmissive = 0.0;
                safeMaterials.forEach(mat => { mat.emissiveIntensity = 0.0; });
                
                document.getElementById('coins-container').classList.add('hidden');
                document.getElementById('tap-text').classList.add('hidden');
                
                // Переміщуємо зірку вище над карткою
                starMesh.position.y = 110; 
                
                const reward = document.getElementById('reward-card');
                reward.classList.remove('hidden');
                setTimeout(() => reward.classList.add('show'), 50); // CSS анімація
                
                // Показуємо кнопку рестарту з невеличкою затримкою
                setTimeout(() => {
                    document.getElementById('retry-btn').classList.remove('hidden');
                }, 800);

                // Плавне повернення освітлення до норми
                targetBloom = 0.3;
                state = STATE.POST;
            }, 300);
        }

        // Обробник для кнопки рестарту
        document.getElementById('retry-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            
            // Скидаємо стан
            state = STATE.IDLE;
            safeGroup.visible = true;
            
            // Додатково гарантуємо, що світіння скинуто
            targetEmissive = 0.0;
            currentEmissive = 0.0;
            targetBloom = 0.3;
            bloomPass.strength = 0.3;
            
            // Ховаємо картку та кнопку
            const reward = document.getElementById('reward-card');
            reward.classList.remove('show');
            setTimeout(() => reward.classList.add('hidden'), 400); 
            
            document.getElementById('retry-btn').classList.add('hidden');
            
            // Показуємо і скидаємо монетки
            document.getElementById('coins-container').classList.remove('hidden');
            for(let i=1; i<=3; i++) {
                document.getElementById('coin-' + i).classList.remove('filled');
            }
            
            // Повертаємо зірку на місце
            starMesh.position.y = starIdleY;
        });

        // --- 9. Анімаційний Цикл ---
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            // Анімація фону (неба)
            if (skyMat) skyMat.uniforms.time.value = time;

            // Анімація частинок
            const positions = particlesMesh.geometry.attributes.position.array;
            for(let i = 1; i < particlesCount * 3; i += 3) {
                // Робимо швидкість незалежною від FPS
                positions[i] += speedArray[(i-1)/3] * (dt * 60); 
                if(positions[i] > 200) positions[i] = -50;
            }
            particlesMesh.geometry.attributes.position.needsUpdate = true;

            // Анімація сейфу
            if (safeGroup.visible) {
                // Відновлення форми (пружина) після деформації
                squashY += (1.0 - squashY) * dt * 12;
                squashXZ += (1.0 - squashXZ) * dt * 12;
                safeGroup.scale.set(squashXZ, squashY, squashXZ);
                
                // Левітація (зменшена амплітуда та швидкість)
                safeGroup.position.y = basePosition.y + Math.sin(time * 1.5) * 2.5;
                
                // Інтерполяція світіння матеріалів
                currentEmissive += (targetEmissive - currentEmissive) * dt * 10;
                safeMaterials.forEach(mat => { mat.emissiveIntensity = currentEmissive; });
            }

            // Інтерполяція Bloom ефекту
            bloomPass.strength += (targetBloom - bloomPass.strength) * dt * 8;

            // Оновлюємо AnimationMixer для лицарів
            knightMixers.forEach(mixer => mixer.update(dt));

            // Рендеримо через Composer замість renderer.render()
            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
